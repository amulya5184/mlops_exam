name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Training
      run: python train.py

    - name: Build Docker Image
      run: docker build -t mlops-exam .
